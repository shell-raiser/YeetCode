<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>YeetCode Options</title>
    <style>
        :root {
            --bg: #2c2c2c;
            --card-bg: rgba(20, 20, 20, 0.95);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f5;
            --text-secondary: #b0b0b0;
            --primary: #f39c12;
            --primary-hover: #d35400;
            --accent-blue: #f1c40f;
            --accent-blue-hover: #f39c12;
            --danger: #d35400;
            --danger-bg: rgba(211, 84, 0, 0.12);
            --danger-border: rgba(211, 84, 0, 0.2);
            --success-bg: rgba(241, 196, 15, 0.12);
            --success-border: rgba(241, 196, 15, 0.25);
            --input-bg: rgba(25, 25, 25, 0.95);
            --input-focus-glow: rgba(241, 196, 15, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            width: 420px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 520px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 18px;
        }

        h2 {
            font-size: 18px;
            font-weight: 600;
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13.5px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--input-focus-glow);
            background: rgba(15, 23, 42, 0.8);
        }

        .token-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
            cursor: pointer;
            user-select: none;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .token-toggle input {
            width: auto;
            margin: 0;
            cursor: pointer;
        }

        .token-toggle:hover {
            color: var(--text-primary);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        button {
            flex: 1;
            padding: 11px 16px;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        #test {
            background-color: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
        }

        #test:hover:not(:disabled) {
            background-color: rgba(59, 130, 246, 0.08);
            border-color: var(--accent-blue-hover);
        }

        #save {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        #save:hover:not(:disabled) {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 12.5px;
            line-height: 1.4;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .status.success {
            display: block;
            background-color: var(--success-bg);
            border: 1px solid var(--success-border);
            color: #34d399;
        }

        .status.error {
            display: block;
            background-color: var(--danger-bg);
            border: 1px solid var(--danger-border);
            color: #f87171;
        }

        .status.loading {
            display: block;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .footer-note {
            margin-top: 16px;
            font-size: 11px;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.4;
        }

        .footer-note a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <img class="logo-icon" src="icons/icon48.png" alt="">
        <h2>YeetCode</h2>
    </div>
    
    <div class="card">
        <div class="form-group">
            <label for="githubToken">GitHub Token (needs 'repo' scope)</label>
            <div class="input-wrapper">
                <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxx">
            </div>
            <label class="token-toggle">
                <input type="checkbox" id="toggleToken"> Show token
            </label>
        </div>
        
        <div class="form-group">
            <label for="githubRepo">GitHub Repository (owner/repo)</label>
            <input type="text" id="githubRepo" placeholder="e.g., username/leetcode-solutions">
        </div>
        
        <div class="form-group">
            <label for="githubBranch">Branch name</label>
            <input type="text" id="githubBranch" value="main">
        </div>
        
        <div class="form-group">
            <label for="githubFolder">Parent folder (optional)</label>
            <input type="text" id="githubFolder" placeholder="e.g., leetcode">
        </div>
        
        <div style="display: flex; align-items: center; gap: 8px; margin: 4px 0;">
            <input type="checkbox" id="saveNotesAndTimer" style="width: auto; margin: 0; cursor: pointer;" checked>
            <label for="saveNotesAndTimer" style="text-transform: none; font-size: 13px; font-weight: 500; color: var(--text-primary); cursor: pointer; user-select: none;">Save Notes & Timer in separate file</label>
        </div>
        
        <div class="button-group">
            <button id="test">Test Connection</button>
            <button id="save">Save Settings</button>
        </div>
        
        <div id="status" class="status"></div>
    </div>

    <p class="footer-note">
        GitHub Personal Access Tokens can be created in <br>
        <a href="https://github.com/settings/personal-access-tokens" target="_blank">GitHub Personal Access Tokens</a>.
    </p>

    <script src="options.js"></script>
</body>
</html>
